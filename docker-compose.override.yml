services:
  personal-site:
    ports:
      - "9854:80"
      - "9855:81"
    networks:
      - local-net
    volumes:
      - ./html/dashboard:/usr/share/nginx/dashboard:ro
      - ./html/portfolio:/usr/share/nginx/portfolio:ro
      - ./.local/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  proxy-network:
    external: false
  local-net:
    driver: bridge