services:
  personal-site:
    image: nginx:alpine
    container_name: personal-site
    restart: unless-stopped
    ports:
      - "9812:80"
    volumes:
      - ./html/dashboard:/usr/share/nginx/dashboard:ro
      - ./html/portfolio:/usr/share/nginx/portfolio:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
